<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Get some Random Cat Facts and Dog Images</h1>
    <button id="get-cat-fact">Get Cat Fact</button>

    <button id="get-country-info">Get Country Info</button>
    <ul id="country-results"></ul>

    <button id="get-college-info-by-state">Get College Info by State</button>
    <ul id="college-results-state"></ul>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
